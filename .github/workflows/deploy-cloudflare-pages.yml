name: Deploy Cloudflare Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      API_DOMAIN: ${{ vars.API_DOMAIN }}
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

    steps:
      - name: Check out verified source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Activate Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Validate deployment configuration
        run: |
          test -n "$CLOUDFLARE_PAGES_PROJECT"
          [[ "$API_DOMAIN" =~ ^[A-Za-z0-9.-]+$ ]]

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_API_URL: https://${{ vars.API_DOMAIN }}
        run: yarn workspace @rag/web build

      - name: Deploy verified commit to Cloudflare Pages
        working-directory: web
        run: >-
          yarn wrangler pages deploy dist
          --project-name "$CLOUDFLARE_PAGES_PROJECT"
          --branch master
          --commit-hash "${{ github.event.workflow_run.head_sha }}"

      - name: Smoke test Pages production URL
        run: curl --fail --silent --show-error --retry 8 --retry-all-errors --retry-delay 5 "https://${CLOUDFLARE_PAGES_PROJECT}.pages.dev/" > /dev/null

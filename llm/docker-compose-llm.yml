version: "3.9"

services:
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: tei-embed
    restart: unless-stopped
    ports:
      - "8080:80"
    expose:
      - "80"
    volumes:
      - tei-embed:/data
    environment:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    command:
      - --model-id
      - BAAI/bge-m3

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: tei-rerank
    restart: unless-stopped
    ports:
      - "8081:80"
    expose:
      - "80"
    volumes:
      - tei-reranker:/data
    environment:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    command:
      - --model-id
      - BAAI/bge-reranker-base

#  nginx:
#    image: nginx:alpine
#    restart: unless-stopped
#    ports:
#      - "80:80"
#      - "443:443"
#    volumes:
#      - ./nginx.conf:/etc/nginx/nginx.conf:ro
#      - ./certs:/etc/nginx/certs
#    depends_on:
#      - tei-embed
#      - tei-rerank
volumes:
  tei-embed:
      driver: local
  tei-reranker:
      driver: local
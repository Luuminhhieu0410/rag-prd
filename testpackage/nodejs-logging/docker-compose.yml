services:
  node-app:
    build:
      context: ./node-app
    container_name: nodejs-logging-app
    environment:
      PORT: 3000
      LOG_FILE: /var/log/node-app/app.log
      SERVICE_NAME: nodejs-logging-demo
    ports:
      - "3005:3000"
    volumes:
      - ./logs/node-app:/var/log/node-app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  fluent-bit:
    image: fluent/fluent-bit:3.1
    container_name: nodejs-logging-fluent-bit
    depends_on:
      elasticsearch:
        condition: service_healthy
      node-app:
        condition: service_started
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./logs/node-app:/var/log/node-app:ro
      - fluent-bit-state:/fluent-bit/state

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: nodejs-logging-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9205:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: nodejs-logging-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5605:5601"
    volumes:
      - kibana-data:/usr/share/kibana/data

volumes:
  elasticsearch-data:
  fluent-bit-state:
  kibana-data:
